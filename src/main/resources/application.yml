server:
  port: 8080

spring:
  application:
    name: booking-poc
  datasource:
    url: jdbc:h2:mem:bookingpoc;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
  sql:
    init:
      mode: always

booking:
  seat:
    soft-hold-ttl-seconds: 300
    sweep-interval-seconds: 30
  overbooking:
    default-overbook-factor: 0.10
    voluntary-bonus: 200
    involuntary-compensation: 800

logging:
  level:
    com.example.bookingpoc: DEBUG
